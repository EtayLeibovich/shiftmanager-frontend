<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftManager | הצטרפות לעסק</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Heebo', sans-serif; } </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- מסך הרישום -->
    <div id="register-screen" class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🏢</div>
            <h1 class="text-3xl font-black text-slate-800">הצטרף לעסק</h1>
            <p class="text-slate-500 mt-2">ShiftManager — רישום עובד חדש</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">קוד העסק *</label>
                <input type="text" id="join-code" placeholder="לדוגמה: ABC123" maxlength="6"
                       class="w-full border border-slate-200 rounded-xl p-3 text-center text-2xl font-black tracking-widest uppercase outline-none focus:ring-2 focus:ring-blue-500"
                       oninput="this.value = this.value.toUpperCase()">
                <p id="biz-name" class="text-emerald-600 font-bold text-sm mt-1 min-h-[20px] text-center"></p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">שם מלא *</label>
                <input type="text" id="full-name" placeholder="ישראל ישראלי"
                       class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">קוד אישי *</label>
                <input type="password" id="passcode" placeholder="בחר קוד שתזכור (4-8 ספרות)"
                       class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-slate-400 text-xs mt-1">הקוד ישמש לכניסה ויציאה ממשמרות</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">טלפון (אופציונלי)</label>
                <input type="tel" id="phone" placeholder="050-0000000"
                       class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <p id="error-msg" class="text-rose-500 font-bold text-sm mt-4 text-center min-h-[20px]"></p>

        <button onclick="submitRegister()"
                class="w-full mt-4 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all text-lg">
            שלח בקשת הצטרפות
        </button>

        <a href="index.html" class="block text-center text-slate-400 text-sm mt-4 hover:text-slate-600">
            ← חזרה לדף הראשי
        </a>
    </div>

    <!-- מסך הצלחה -->
    <div id="success-screen" class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md text-center" style="display:none">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-3xl font-black text-slate-800 mb-3">הבקשה נשלחה!</h2>
        <p class="text-slate-500 text-lg mb-6">המנהל יאשר את הצטרפותך בקרוב.</p>
        <div class="bg-blue-50 rounded-2xl p-4 mb-6 text-right">
            <p class="text-blue-700 font-bold">📌 מה עכשיו?</p>
            <ul class="text-blue-600 text-sm mt-2 space-y-1">
                <li>• המנהל יקבל התראה על בקשתך</li>
                <li>• לאחר האישור תוכל להתחבר עם הקוד שבחרת</li>
                <li>• אם לא קיבלת אישור תוך 24 שעות, פנה למנהל</li>
            </ul>
        </div>
        <a href="employee.html" class="block bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">
            → כניסה לפורטל עובד
        </a>
    </div>

<script>
    const API = "https://shiftmanager-backend-n0ix.onrender.com";

    // אם יש קוד ב-URL - מלא אוטומטית
    window.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            document.getElementById('join-code').value = code.toUpperCase();
            validateCode(code);
        }
    });

    // בדיקת קוד בזמן אמת
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('join-code').addEventListener('input', (e) => {
            const code = e.target.value.trim();
            if (code.length === 6) validateCode(code);
            else document.getElementById('biz-name').textContent = '';
        });
    });

    async function validateCode(code) {
        try {
            const res = await fetch(`${API}/businesses/${code}/join-code-check`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ join_code: code })
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('biz-name').textContent = `✅ ${data.business_name}`;
            } else {
                document.getElementById('biz-name').textContent = '';
            }
        } catch {}
    }

    async function submitRegister() {
        const joinCode = document.getElementById('join-code').value.trim().toUpperCase();
        const fullName = document.getElementById('full-name').value.trim();
        const passcode = document.getElementById('passcode').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const err = document.getElementById('error-msg');

        if (!joinCode || joinCode.length !== 6) { err.textContent = 'הכנס קוד עסק תקין (6 תווים)'; return; }
        if (!fullName) { err.textContent = 'הכנס שם מלא'; return; }
        if (!passcode || passcode.length < 3) { err.textContent = 'בחר קוד אישי (לפחות 3 תווים)'; return; }

        try {
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    join_code: joinCode,
                    full_name: fullName,
                    passcode: passcode,
                    phone: phone,
                })
            });
            const data = await res.json();
            if (!res.ok) {
                err.textContent = data.detail || 'שגיאה בשליחת הבקשה';
                return;
            }
            // הצלחה!
            document.getElementById('register-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        } catch {
            err.textContent = 'שגיאת תקשורת - ודא שהשרת פועל';
        }
    }
</script>
</body>
</html>
