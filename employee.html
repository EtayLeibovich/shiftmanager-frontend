<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftManager | פורטל עובד</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">

<!-- ==================== מסך כניסה ==================== -->
<div id="login-screen" class="min-h-screen bg-slate-900 flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-sm text-center">
        <div class="text-5xl mb-4">👷‍♂️</div>
        <h1 class="text-3xl font-black text-slate-800 mb-2">פורטל עובד</h1>
        <p class="text-slate-500 mb-8">ShiftManager</p>
        <input type="password" id="login-passcode" placeholder="קוד אישי"
               class="w-full p-4 bg-slate-100 rounded-xl text-center text-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 border border-slate-200"
               onkeypress="if(event.key==='Enter') handleLogin()">
        <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all text-lg">
            כניסה
        </button>
        <p id="login-error" class="mt-4 text-rose-500 font-bold text-sm min-h-[20px]"></p>
        <a href="index.html" class="mt-6 block text-slate-400 text-sm hover:text-slate-600">→ שעון נוכחות משותף</a>
    </div>
</div>

<!-- ==================== הפורטל ==================== -->
<div id="portal" style="display:none">

    <!-- כותרת עליונה -->
    <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-slate-400 text-xs">ShiftManager</p>
                <h1 id="portal-greeting" class="text-xl font-black text-slate-800">שלום!</h1>
            </div>
            <button onclick="handleLogout()" class="bg-rose-50 text-rose-500 px-4 py-2 rounded-xl text-sm font-bold hover:bg-rose-100">
                התנתק
            </button>
        </div>
    </header>

    <div class="max-w-2xl mx-auto p-4">

        <!-- כרטיס כניסה / יציאה ממשמרת -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-4">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-slate-400 text-sm mb-1">סטטוס משמרת</p>
                    <div class="flex items-center gap-2">
                        <span id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></span>
                        <span id="status-text" class="font-bold text-slate-600">בודק...</span>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button id="btn-clock-in" onclick="doClock('clock-in')"
                            class="bg-emerald-500 text-white font-bold px-5 py-3 rounded-xl hover:bg-emerald-600 transition-all">
                        ✅ כניסה
                    </button>
                    <button id="btn-clock-out" onclick="doClock('clock-out')"
                            class="bg-rose-500 text-white font-bold px-5 py-3 rounded-xl hover:bg-rose-600 transition-all" style="display:none">
                        🔴 יציאה
                    </button>
                </div>
            </div>
            <p id="clock-msg" class="mt-3 text-sm font-bold min-h-[20px] text-center"></p>
        </div>

        <!-- כרטיסי סטטיסטיקה -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center">
                <p class="text-slate-400 text-xs font-bold mb-1">שעות החודש</p>
                <p id="stat-hours" class="text-2xl font-black text-blue-600">-</p>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center">
                <p class="text-slate-400 text-xs font-bold mb-1">שכר משוער</p>
                <p id="stat-salary" class="text-2xl font-black text-emerald-600">-</p>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 p-4 text-center">
                <p class="text-slate-400 text-xs font-bold mb-1">משמרות הבאות</p>
                <p id="stat-upcoming" class="text-2xl font-black text-purple-600">-</p>
            </div>
        </div>

        <!-- התראות אישיות -->
        <div id="my-notifs" class="mb-4 space-y-2"></div>

        <!-- טאבים -->
        <div class="flex gap-2 mb-4 bg-white rounded-2xl p-1.5 border border-slate-200">
            <button onclick="showTab('shifts')" id="ptab-shifts"
                    class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white transition-all">
                🕐 המשמרות שלי
            </button>
            <button onclick="showTab('schedule')" id="ptab-schedule"
                    class="flex-1 py-2.5 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all">
                📅 לוח זמנים
            </button>
            <button onclick="showTab('leave')" id="ptab-leave"
                    class="flex-1 py-2.5 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all">
                🏖️ היעדרות
            </button>
        </div>

        <!-- תוכן: המשמרות שלי -->
        <div id="tab-shifts" class="tab-content active">
            <div id="shifts-list" class="space-y-2">
                <p class="text-slate-400 text-center py-6">טוען...</p>
            </div>
        </div>

        <!-- תוכן: לוח זמנים -->
        <div id="tab-schedule" class="tab-content">
            <div id="schedule-list" class="space-y-2">
                <p class="text-slate-400 text-center py-6">טוען...</p>
            </div>
        </div>

        <!-- תוכן: היעדרות -->
        <div id="tab-leave" class="tab-content">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 mb-4">
                <h3 class="font-bold text-lg mb-4">📝 שלח בקשת היעדרות</h3>
                <div class="grid grid-cols-2 gap-4 mb-3">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-500 mb-1">סוג</label>
                        <select id="leave-type" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="vacation">חופשה</option>
                            <option value="sick">מחלה</option>
                            <option value="personal">אישי</option>
                            <option value="other">אחר</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-1">מתאריך</label>
                        <input type="date" id="leave-start" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-500 mb-1">עד תאריך</label>
                        <input type="date" id="leave-end" class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <textarea id="leave-reason" rows="2" placeholder="סיבה (אופציונלי)"
                          class="w-full border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 mb-3"></textarea>
                <button onclick="submitLeave()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">
                    שלח בקשה
                </button>
                <p id="leave-msg" class="text-center text-sm font-bold mt-2 min-h-[20px]"></p>
            </div>

            <h3 class="font-bold text-lg mb-3">הבקשות שלי</h3>
            <div id="leave-history" class="space-y-2">
                <p class="text-slate-400 text-center py-4">טוען...</p>
            </div>
        </div>

    </div>
</div>

<script>
    const API = "https://shiftmanager-backend-n0ix.onrender.com";
    let passcode = sessionStorage.getItem('emp_passcode') || '';
    let userData = null;
    let businessId = null;

    window.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('leave-start').value = today;
        document.getElementById('leave-end').value = today;
        if (passcode) showPortal();
    });

    // ==================== כניסה / יציאה ====================
    async function handleLogin() {
        const code = document.getElementById('login-passcode').value.trim();
        const err = document.getElementById('login-error');
        if (!code) { err.textContent = 'הכנס קוד'; return; }
        try {
            const res = await fetch(`${API}/users/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode: code })
            });
            const user = await res.json();
            if (!res.ok) { err.textContent = user.detail || 'קוד שגוי'; return; }
            passcode = code;
            sessionStorage.setItem('emp_passcode', code);
            showPortal();
        } catch { err.textContent = 'שגיאת תקשורת'; }
    }

    function handleLogout() {
        passcode = ''; userData = null; businessId = null;
        sessionStorage.removeItem('emp_passcode');
        document.getElementById('portal').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('login-passcode').value = '';
    }

    async function showPortal() {
        try {
            const res = await fetch(`${API}/shifts/personal-stats/${passcode}`);
            if (!res.ok) { sessionStorage.removeItem('emp_passcode'); return; }
            const data = await res.json();
            userData = data.user;
            businessId = data.user.business_id;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('portal').style.display = 'block';
            document.getElementById('portal-greeting').textContent = `שלום, ${data.user.full_name} 👋`;
            document.getElementById('stat-hours').textContent = data.monthly_hours;
            document.getElementById('stat-salary').textContent = `₪${data.estimated_salary}`;
            document.getElementById('stat-upcoming').textContent = data.upcoming_shifts;

            const btnIn  = document.getElementById('btn-clock-in');
            const btnOut = document.getElementById('btn-clock-out');
            if (data.is_clocked_in) {
                document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-emerald-400 animate-pulse';
                document.getElementById('status-text').textContent = 'במשמרת כרגע ✅';
                document.getElementById('status-text').className = 'font-bold text-emerald-600';
                btnIn.style.display  = 'none';
                btnOut.style.display = '';
            } else {
                document.getElementById('status-dot').className = 'w-3 h-3 rounded-full bg-slate-300';
                document.getElementById('status-text').textContent = 'לא במשמרת';
                document.getElementById('status-text').className = 'font-bold text-slate-500';
                btnIn.style.display  = '';
                btnOut.style.display = 'none';
            }

            loadMyShifts();
            loadMyNotifications();
        } catch (e) { console.error(e); }
    }

    // ==================== שעון נוכחות ====================
    async function doClock(type) {
        const msg = document.getElementById('clock-msg');
        try {
            const res = await fetch(`${API}/shifts/${type}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode })
            });
            const data = await res.json();
            if (res.ok) {
                msg.textContent = type === 'clock-in' ? '✅ נרשמה כניסה!' : '✅ נרשמה יציאה!';
                msg.className = 'mt-3 text-sm font-bold text-emerald-600 text-center';
                showPortal();
            } else {
                msg.textContent = data.detail || 'שגיאה';
                msg.className = 'mt-3 text-sm font-bold text-rose-500 text-center';
            }
        } catch { msg.textContent = 'שגיאת תקשורת'; }
    }

    // ==================== טאבים ====================
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        ['shifts', 'schedule', 'leave'].forEach(t => {
            const btn = document.getElementById(`ptab-${t}`);
            if (t === tab) {
                btn.className = 'flex-1 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white transition-all';
            } else {
                btn.className = 'flex-1 py-2.5 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-50 transition-all';
            }
        });
        document.getElementById(`tab-${tab}`).classList.add('active');
        if (tab === 'shifts') loadMyShifts();
        else if (tab === 'schedule') loadMySchedule();
        else if (tab === 'leave') loadMyLeave();
    }

    // ==================== משמרות אחרונות ====================
    async function loadMyShifts() {
        try {
            const res = await fetch(`${API}/shifts/personal/${passcode}`);
            const shifts = await res.json();
            const container = document.getElementById('shifts-list');
            if (!shifts.length) {
                container.innerHTML = '<p class="text-slate-400 text-center py-6">אין משמרות עדיין.</p>';
                return;
            }
            container.innerHTML = shifts.map(s => `
                <div class="bg-white rounded-xl border border-slate-200 p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-700">${formatDate(s.clock_in)}</p>
                        <p class="text-sm text-slate-500">
                            ${formatTime(s.clock_in)} ← ${s.clock_out ? formatTime(s.clock_out) : '<span class="text-emerald-500 font-bold">פעיל</span>'}
                        </p>
                    </div>
                    <span class="${s.total_hours != null ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-600'} font-bold px-3 py-1 rounded-full text-sm">
                        ${s.total_hours != null ? s.total_hours + ' ש׳' : 'פעיל'}
                    </span>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    // ==================== לוח זמנים ====================
    async function loadMySchedule() {
        if (!businessId) return;
        try {
            const from = new Date().toISOString().slice(0, 19);
            const to = new Date(Date.now() + 14 * 86400000).toISOString().slice(0, 19);
            const res = await fetch(`${API}/schedule/${businessId}?from_date=${from}&to_date=${to}&user_id=${userData?.id}`);
            const shifts = await res.json();
            const container = document.getElementById('schedule-list');
            if (!shifts.length) {
                container.innerHTML = '<p class="text-slate-400 text-center py-6">אין משמרות מתוזמנות ב-14 הימים הקרובים.</p>';
                return;
            }
            container.innerHTML = shifts.map(s => `
                <div class="bg-white rounded-xl border border-slate-200 p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-slate-700">${formatDate(s.start_time)}</p>
                        <p class="text-sm text-slate-500">${formatTime(s.start_time)} - ${formatTime(s.end_time)}</p>
                        ${s.notes ? `<p class="text-xs text-slate-400 mt-1">${s.notes}</p>` : ''}
                    </div>
                    <span class="bg-purple-100 text-purple-700 font-bold px-3 py-1 rounded-full text-sm">
                        ${calcHours(s.start_time, s.end_time)} ש׳
                    </span>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    // ==================== היעדרויות ====================
    async function loadMyLeave() {
        try {
            const res = await fetch(`${API}/leave/personal/${passcode}`);
            const requests = await res.json();
            const container = document.getElementById('leave-history');
            if (!requests.length) {
                container.innerHTML = '<p class="text-slate-400 text-center py-4">אין בקשות.</p>';
                return;
            }
            const statusStyle = { pending: 'bg-yellow-100 text-yellow-700', approved: 'bg-emerald-100 text-emerald-700', rejected: 'bg-rose-100 text-rose-600' };
            const statusLabel = { pending: 'ממתין', approved: 'אושר', rejected: 'נדחה' };
            const typeLabel = { vacation: 'חופשה', sick: 'מחלה', personal: 'אישי', other: 'אחר' };
            container.innerHTML = requests.map(r => `
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-slate-700">${typeLabel[r.leave_type] || r.leave_type}</p>
                            <p class="text-sm text-slate-500">📅 ${r.start_date} ← ${r.end_date}</p>
                            ${r.reason ? `<p class="text-xs text-slate-400 mt-1">"${r.reason}"</p>` : ''}
                            ${r.manager_note ? `<p class="text-xs text-slate-500 mt-1 italic">הערת מנהל: "${r.manager_note}"</p>` : ''}
                        </div>
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${statusStyle[r.status] || ''}">${statusLabel[r.status] || r.status}</span>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function submitLeave() {
        const msg = document.getElementById('leave-msg');
        const body = {
            passcode,
            leave_type: document.getElementById('leave-type').value,
            start_date: document.getElementById('leave-start').value,
            end_date: document.getElementById('leave-end').value,
            reason: document.getElementById('leave-reason').value,
        };
        if (!body.start_date || !body.end_date) {
            msg.textContent = 'בחר תאריכים';
            msg.className = 'text-center text-sm font-bold mt-2 text-rose-500';
            return;
        }
        try {
            const res = await fetch(`${API}/leave/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                msg.textContent = '✅ הבקשה נשלחה!';
                msg.className = 'text-center text-sm font-bold mt-2 text-emerald-600';
                document.getElementById('leave-reason').value = '';
                loadMyLeave();
            } else {
                const d = await res.json();
                msg.textContent = d.detail || 'שגיאה';
                msg.className = 'text-center text-sm font-bold mt-2 text-rose-500';
            }
        } catch { msg.textContent = 'שגיאת תקשורת'; }
    }

    // ==================== התראות אישיות ====================
    async function loadMyNotifications() {
        if (!businessId || !userData?.id) return;
        try {
            const res = await fetch(`${API}/notifications/${businessId}?user_id=${userData.id}`);
            const notifs = await res.json();
            const container = document.getElementById('my-notifs');
            if (!notifs.length) { container.innerHTML = ''; return; }
            container.innerHTML = notifs.slice(0, 3).map(n => `
                <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 flex justify-between items-center">
                    <span class="text-sm text-blue-800 font-medium">${n.message}</span>
                    <button onclick="dismissNotif(${n.id})" class="text-blue-400 hover:text-blue-600 mr-2 text-lg">×</button>
                </div>
            `).join('');
        } catch {}
    }

    async function dismissNotif(id) {
        await fetch(`${API}/notifications/mark-read/${id}`, { method: 'POST' });
        loadMyNotifications();
    }

    // ==================== עזרים ====================
    function formatTime(dt) {
        if (!dt) return '-';
        return new Date(dt).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
    }
    function formatDate(dt) {
        if (!dt) return '-';
        return new Date(dt).toLocaleDateString('he-IL', { weekday: 'long', day: '2-digit', month: '2-digit' });
    }
    function calcHours(start, end) {
        if (!start || !end) return '?';
        return Math.round(((new Date(end) - new Date(start)) / 3600000) * 10) / 10;
    }
</script>
</body>
</html>
